# Huawei CCE Custom Overrides for Dify

# 1. External DBs Disabled (Using internal ones defined below)
externalRedis:
  enabled: false

externalRedis:
  enabled: false

# 2. Image Pulling from SWR (Using the pre-existing default secrets for CCE)
global:
  consoleApiDomain: "console-api.dify.local"
  consoleWebDomain: "console-web.dify.local"
  serviceApiDomain: "service-api.dify.local"
  appApiDomain: "app-api.dify.local"
  appWebDomain: "app-web.dify.local"
  filesDomain: "files.dify.local"
  enterpriseDomain: "enterprise.dify.local"
  triggerDomain: "trigger.dify.local"

imagePullSecrets:
  - name: default-secret
  - name: dockerhub-secret
  - name: image-repo-secret

# 3. Disable external vector DB (Dify spins up its own weaviate/qdrant by default if not specified)
# We will use the built in Weaviate instead of hooking up our external one to keep Dify completely isolated
vectorDB:
  useExternal: false

weaviate:
  enabled: true
  authentication:
    apikey:
      enabled: false

# 4. Expose Dify Web UI
# Dify Web is the administration console. We will expose it via NodePort to bind it to the ELB later
web:
  service:
    type: NodePort
    port: 3000
    # nodePort: 30080 # Let k8s assign one dynamically unless needed

# 5. Disable Nginx Ingress if CCE ELB is used directly on NodePort
ingress:
  enabled: false

# 6. Reduce Resource Pressure (Disable enterprise plugins & heavy parsing for POC)
unstructured:
  enabled: false

plugin_daemon:
  enabled: false
  
plugin_manager:
  enabled: false

plugin_connector:
  replicas: 0
  
plugin_controller:
  replicas: 0

# 7. Persistence & Storage Classes (Huawei CCE configuration)
# CCE requires explicit storage class names. We use internal S3 to avoid block storage RWO issues.
persistence:
  type: s3
  s3:
    endpoint: "http://dify-minio:9000"
    accessKey: "minioadmin"
    secretKey: "NzGG+ngHuwz0xzMQ1XFt8JYCAxdrhnQ8/93LCggMt00="
    region: "us-east-1"
    bucketName: "dify"
    useAwsManagedIam: false
    useAwsS3: false

weaviate:
  nodeSelector:
    kubernetes.io/hostname: 10.0.1.193
  storage:
    size: 20Gi
    storageClassName: csi-disk
  image:
    registry: ""
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/dify/weaviate
    tag: "1.24.8"

