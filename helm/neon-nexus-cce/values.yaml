# Global values for Neon Nexus
global:
  env: "production"

# External Qdrant Dependency
qdrant:
  enabled: true
  replicaCount: 1
  image:
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/qdrant
    tag: v1.10.1
  service:
    type: ClusterIP
  persistence:
    storageClassName: csi-disk
  imagePullSecrets:
    - name: default-secret

# Internal Microservices (Subcharts)
frontend:
  enabled: true
  image:
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus
    tag: "frontend-latest"
  imagePullSecrets:
    - name: default-secret
  service:
    type: NodePort
    port: 3000
  ingress:
    enabled: true
    className: "cce"
    annotations:
      kubernetes.io/elb.class: union
      kubernetes.io/elb.id: "28673c69-6733-4986-b55e-ca40ce18fecf"
      kubernetes.io/elb.port: "80"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix

backend:
  enabled: true
  image:
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus
    tag: "backend-latest"
  imagePullSecrets:
    - name: default-secret
  service:
    type: ClusterIP
    port: 8000
  env:
    MCP_SSE_RAG_URL: "http://neon-nexus-rag-memory.default.svc.cluster.local:8000/sse"
    MCP_SSE_VISION_URL: "http://neon-nexus-vision.default.svc.cluster.local:8000/sse"
    MCP_SSE_AUDIO_URL: "http://neon-nexus-audio.default.svc.cluster.local:8000/sse"

rag-memory:
  enabled: true
  image:
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus
    tag: "rag-memory-latest"
    pullPolicy: Always
  imagePullSecrets:
    - name: default-secret
  service:
    type: ClusterIP
    port: 8000
    # Long-lived HTTP connection support for SSE
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  env:
    QDRANT_URL: "http://neon-nexus-qdrant.default.svc.cluster.local:6333"

vision:
  enabled: true
  image:
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus
    tag: "vision-latest"
    pullPolicy: Always
  imagePullSecrets:
    - name: default-secret
  service:
    type: ClusterIP
    port: 8000
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

audio:
  enabled: true
  image:
    repository: swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus
    tag: "audio-latest"
    pullPolicy: Always
  imagePullSecrets:
    - name: default-secret
  service:
    type: ClusterIP
    port: 8000
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
