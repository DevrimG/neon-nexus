apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-audio
  labels:
    app: audio
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: audio
