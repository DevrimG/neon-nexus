apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vision
  labels:
    app: vision
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: vision
