name: Build and Deploy Neon Nexus

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: pontiffscopez/neon-nexus

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: 
          - backend
          - frontend
          - mcp-servers/rag-memory
          - mcp-servers/vision
          - mcp-servers/audio
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract component name
        id: format_tag
        run: |
          # Convert 'mcp-servers/rag-memory' to 'rag-memory'
          TAG_SUFFIX=$(basename ${{ matrix.component }})
          echo "tag_suffix=${TAG_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.format_tag.outputs.tag_suffix }}-${{ github.sha }},${{ env.DOCKER_IMAGE }}:${{ steps.format_tag.outputs.tag_suffix }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
