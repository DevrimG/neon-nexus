name: Build and Deploy Neon Nexus

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: pontiffscopez/neon-nexus

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: 
          - backend
          - frontend
          - mcp-servers/rag-memory
          - mcp-servers/vision
          - mcp-servers/audio
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Huawei SWR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: swr.tr-west-1.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Extract component name
        id: format_tag
        run: |
          # Convert 'mcp-servers/rag-memory' to 'rag-memory'
          TAG_SUFFIX=$(basename ${{ matrix.component }})
          echo "tag_suffix=${TAG_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.format_tag.outputs.tag_suffix }}-${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.format_tag.outputs.tag_suffix }}-latest
            swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus:${{ steps.format_tag.outputs.tag_suffix }}-${{ github.sha }}
            swr.tr-west-1.myhuaweicloud.com/devrim/neon-nexus:${{ steps.format_tag.outputs.tag_suffix }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  mirror-dify:
    name: Mirror Dify Images to SWR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Huawei SWR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: swr.tr-west-1.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Run Dify Mirror Script
        if: github.event_name != 'pull_request'
        run: |
          chmod +x dify_mirror.sh
          ./dify_mirror.sh

  deploy-cce:
    name: Deploy to Huawei CCE
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: Configure kubeconfig
        env:
          CCE_KUBECONFIG_B64: ${{ secrets.CCE_KUBECONFIG_B64 }}
          CCE_KUBECONFIG: ${{ secrets.CCE_KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -n "$CCE_KUBECONFIG_B64" ]; then
            echo "$CCE_KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          elif [ -n "$CCE_KUBECONFIG" ]; then
            printf "%s" "$CCE_KUBECONFIG" > "$HOME/.kube/config"
          else
            echo "Missing CCE kubeconfig secret. Set CCE_KUBECONFIG_B64 or CCE_KUBECONFIG."
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Verify Cluster Access
        run: |
          kubectl cluster-info
          kubectl get ns

      - name: Deploy Neon Nexus Helm Release
        run: |
          helm upgrade --install neon-nexus ./helm/neon-nexus-cce \
            --namespace neon-nexus \
            --create-namespace \
            --wait \
            --timeout 15m \
            -f ./helm/neon-nexus-cce/values.yaml \
            --set frontend.image.tag=frontend-${{ github.sha }} \
            --set backend.image.tag=backend-${{ github.sha }} \
            --set rag-memory.image.tag=rag-memory-${{ github.sha }} \
            --set vision.image.tag=vision-${{ github.sha }} \
            --set audio.image.tag=audio-${{ github.sha }}

      - name: Verify Workload Rollout
        run: |
          kubectl rollout status deployment/neon-nexus-frontend -n neon-nexus --timeout=10m
          kubectl rollout status deployment/neon-nexus-backend -n neon-nexus --timeout=10m
          kubectl rollout status deployment/neon-nexus-rag-memory -n neon-nexus --timeout=10m
          kubectl rollout status deployment/neon-nexus-vision -n neon-nexus --timeout=10m
          kubectl rollout status deployment/neon-nexus-audio -n neon-nexus --timeout=10m
